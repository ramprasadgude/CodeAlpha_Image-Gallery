<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0a0a0a;
    --surface:#111;
    --border:#222;
    --accent:#c8a96e;
    --accent2:#e8c98e;
    --text:#f0ece4;
    --muted:#666;
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
  }

  /* HEADER */
  header{
    padding:3rem 4rem 2rem;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  header h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,4vw,3.5rem);
    font-weight:400;
    letter-spacing:-0.02em;
    line-height:1;
  }
  header h1 em{
    color:var(--accent);
    font-style:italic;
  }
  .header-sub{
    font-size:.8rem;
    color:var(--muted);
    letter-spacing:.15em;
    text-transform:uppercase;
    margin-bottom:.3rem;
  }

  /* FILTERS */
  .filters{
    display:flex;
    gap:.75rem;
    padding:2rem 4rem;
    flex-wrap:wrap;
  }
  .filter-btn{
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    padding:.45rem 1.2rem;
    border-radius:999px;
    font-family:'DM Sans',sans-serif;
    font-size:.8rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .25s;
  }
  .filter-btn:hover{border-color:var(--accent);color:var(--accent)}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0a;font-weight:500}

  /* GRID */
  .gallery{
    padding:0 4rem 4rem;
    columns:4 280px;
    gap:1rem;
  }
  .gallery-item{
    break-inside:avoid;
    margin-bottom:1rem;
    position:relative;
    overflow:hidden;
    border-radius:4px;
    cursor:pointer;
    background:var(--surface);
  }
  .gallery-item img{
    width:100%;
    display:block;
    transition:transform .5s cubic-bezier(.25,.46,.45,.94);
  }
  .gallery-item::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 50%);
    opacity:0;
    transition:opacity .3s;
  }
  .gallery-item:hover::after{opacity:1}
  .gallery-item:hover img{transform:scale(1.05)}

  .item-info{
    position:absolute;
    bottom:0;left:0;right:0;
    padding:1.2rem 1rem .9rem;
    z-index:2;
    transform:translateY(8px);
    opacity:0;
    transition:all .3s;
  }
  .gallery-item:hover .item-info{opacity:1;transform:translateY(0)}
  .item-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400}
  .item-cat{font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-top:.2rem}

  .zoom-icon{
    position:absolute;
    top:1rem;right:1rem;
    width:32px;height:32px;
    background:rgba(200,169,110,.9);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    z-index:3;
    opacity:0;
    transform:scale(.7);
    transition:all .3s;
  }
  .gallery-item:hover .zoom-icon{opacity:1;transform:scale(1)}
  .zoom-icon svg{width:14px;height:14px;fill:none;stroke:#0a0a0a;stroke-width:2.5;stroke-linecap:round}

  /* LIGHTBOX */
  .lightbox{
    position:fixed;inset:0;
    background:rgba(0,0,0,.92);
    backdrop-filter:blur(12px);
    z-index:1000;
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .3s;
  }
  .lightbox.open{opacity:1;pointer-events:all}

  .lb-inner{
    position:relative;
    max-width:90vw;max-height:90vh;
    display:flex;align-items:center;gap:2rem;
  }
  .lb-img-wrap{
    position:relative;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 40px 80px rgba(0,0,0,.6);
  }
  .lb-img-wrap img{
    max-width:70vw;
    max-height:80vh;
    display:block;
    object-fit:contain;
  }
  .lb-caption{
    position:absolute;
    bottom:0;left:0;right:0;
    padding:1.5rem 1.2rem 1rem;
    background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  }
  .lb-caption h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400}
  .lb-caption span{font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}

  .lb-nav{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:50%;
    width:48px;height:48px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:all .2s;
    color:#fff;
    flex-shrink:0;
  }
  .lb-nav:hover{background:var(--accent);border-color:var(--accent);color:#0a0a0a}
  .lb-nav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

  .lb-close{
    position:absolute;
    top:-1rem;right:-1rem;
    width:36px;height:36px;
    background:var(--accent);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:10;
    border:none;
  }
  .lb-close svg{width:12px;height:12px;fill:none;stroke:#0a0a0a;stroke-width:3;stroke-linecap:round}

  .lb-counter{
    position:absolute;
    top:1rem;left:50%;transform:translateX(-50%);
    font-size:.75rem;color:var(--muted);letter-spacing:.1em;
  }

  /* NO RESULTS */
  .no-results{
    padding:4rem;
    text-align:center;
    color:var(--muted);
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:1.3rem;
    display:none;
  }

  @media(max-width:768px){
    header{padding:2rem;flex-direction:column;align-items:flex-start;gap:1rem}
    .filters{padding:1.5rem 2rem}
    .gallery{padding:0 2rem 3rem;columns:2 160px}
    .lb-inner{gap:1rem}
    .lb-img-wrap img{max-width:85vw}
  }
</style>
</head>
<body>

<header>
  <div>
    <p class="header-sub">Visual Collection</p>
    <h1>The <em>Gallery</em></h1>
  </div>
  <div style="text-align:right">
    <p style="font-size:.8rem;color:var(--muted)" id="count-label">24 works</p>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="nature">Nature</button>
  <button class="filter-btn" data-cat="architecture">Architecture</button>
  <button class="filter-btn" data-cat="abstract">Abstract</button>
  <button class="filter-btn" data-cat="portrait">Portrait</button>
</div>

<div class="gallery" id="gallery"></div>
<p class="no-results" id="no-results">No images in this category yet.</p>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-counter" id="lb-counter"></div>
  <button class="lb-nav" id="lb-prev">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="lb-img-wrap">
    <img id="lb-img" src="" alt=""/>
    <div class="lb-caption">
      <h2 id="lb-title"></h2>
      <span id="lb-cat"></span>
    </div>
    <button class="lb-close" id="lb-close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <button class="lb-nav" id="lb-next">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<script>
const images = [
  {id:1,title:'Forest Light',cat:'nature',url:'https://picsum.photos/seed/nat1/600/800',w:600,h:800},
  {id:2,title:'Glass Tower',cat:'architecture',url:'https://picsum.photos/seed/arch1/700/500',w:700,h:500},
  {id:3,title:'Chromatic Study',cat:'abstract',url:'https://picsum.photos/seed/abs1/600/600',w:600,h:600},
  {id:4,title:'Golden Hour',cat:'nature',url:'https://picsum.photos/seed/nat2/800/600',w:800,h:600},
  {id:5,title:'Still Life',cat:'portrait',url:'https://picsum.photos/seed/por1/500/700',w:500,h:700},
  {id:6,title:'Urban Grid',cat:'architecture',url:'https://picsum.photos/seed/arch2/600/800',w:600,h:800},
  {id:7,title:'Waterfall',cat:'nature',url:'https://picsum.photos/seed/nat3/700/900',w:700,h:900},
  {id:8,title:'Color Field',cat:'abstract',url:'https://picsum.photos/seed/abs2/800/500',w:800,h:500},
  {id:9,title:'Solitude',cat:'portrait',url:'https://picsum.photos/seed/por2/600/750',w:600,h:750},
  {id:10,title:'Bridge Arc',cat:'architecture',url:'https://picsum.photos/seed/arch3/800/600',w:800,h:600},
  {id:11,title:'Tide Pool',cat:'nature',url:'https://picsum.photos/seed/nat4/600/400',w:600,h:400},
  {id:12,title:'Geometry',cat:'abstract',url:'https://picsum.photos/seed/abs3/500/500',w:500,h:500},
  {id:13,title:'Morning Mist',cat:'nature',url:'https://picsum.photos/seed/nat5/700/500',w:700,h:500},
  {id:14,title:'Cathedral',cat:'architecture',url:'https://picsum.photos/seed/arch4/600/900',w:600,h:900},
  {id:15,title:'Reverie',cat:'portrait',url:'https://picsum.photos/seed/por3/500/650',w:500,h:650},
  {id:16,title:'Motion Blur',cat:'abstract',url:'https://picsum.photos/seed/abs4/700/700',w:700,h:700},
  {id:17,title:'Desert Dunes',cat:'nature',url:'https://picsum.photos/seed/nat6/800/500',w:800,h:500},
  {id:18,title:'Staircase',cat:'architecture',url:'https://picsum.photos/seed/arch5/600/800',w:600,h:800},
  {id:19,title:'Inner World',cat:'portrait',url:'https://picsum.photos/seed/por4/550/700',w:550,h:700},
  {id:20,title:'Void',cat:'abstract',url:'https://picsum.photos/seed/abs5/800/600',w:800,h:600},
  {id:21,title:'Autumn Path',cat:'nature',url:'https://picsum.photos/seed/nat7/600/800',w:600,h:800},
  {id:22,title:'Arches',cat:'architecture',url:'https://picsum.photos/seed/arch6/800/600',w:800,h:600},
  {id:23,title:'Daydream',cat:'portrait',url:'https://picsum.photos/seed/por5/500/600',w:500,h:600},
  {id:24,title:'Flux',cat:'abstract',url:'https://picsum.photos/seed/abs6/700/500',w:700,h:500},
];

let currentCat = 'all';
let filtered = [...images];
let lbIndex = 0;

const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbCat = document.getElementById('lb-cat');
const lbCounter = document.getElementById('lb-counter');
const noResults = document.getElementById('no-results');
const countLabel = document.getElementById('count-label');

function render() {
  gallery.innerHTML = '';
  filtered = currentCat === 'all' ? [...images] : images.filter(i => i.cat === currentCat);
  countLabel.textContent = filtered.length + ' work' + (filtered.length !== 1 ? 's' : '');
  noResults.style.display = filtered.length === 0 ? 'block' : 'none';
  filtered.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `
      <img src="${img.url}" alt="${img.title}" loading="lazy"/>
      <div class="zoom-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="item-info">
        <div class="item-title">${img.title}</div>
        <div class="item-cat">${img.cat}</div>
      </div>`;
    item.addEventListener('click', () => openLightbox(idx));
    gallery.appendChild(item);
  });
}

function openLightbox(idx) {
  lbIndex = idx;
  updateLightbox();
  lightbox.classList.add('open');
}

function updateLightbox() {
  const img = filtered[lbIndex];
  lbImg.src = img.url;
  lbTitle.textContent = img.title;
  lbCat.textContent = img.cat;
  lbCounter.textContent = (lbIndex + 1) + ' / ' + filtered.length;
}

document.getElementById('lb-close').addEventListener('click', () => lightbox.classList.remove('open'));
lightbox.addEventListener('click', e => { if(e.target === lightbox) lightbox.classList.remove('open'); });

document.getElementById('lb-prev').addEventListener('click', () => {
  lbIndex = (lbIndex - 1 + filtered.length) % filtered.length;
  updateLightbox();
});
document.getElementById('lb-next').addEventListener('click', () => {
  lbIndex = (lbIndex + 1) % filtered.length;
  updateLightbox();
});

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  render();
});

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') lightbox.classList.remove('open');
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; updateLightbox(); }
});

render();
</script>
</body>
</html>
